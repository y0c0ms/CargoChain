name: CargoChain CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Contracts — compile & test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: prototype/package-lock.json

      - name: Install dependencies
        working-directory: prototype
        run: npm ci

      - name: Compile contracts
        working-directory: prototype
        run: npx hardhat compile

      - name: Run full test suite
        working-directory: prototype
        run: npx hardhat test

  frontend:
    name: Front-end — type-check & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: prototype/app/package-lock.json

      - name: Install dependencies
        working-directory: prototype/app
        run: npm ci

      - name: Build Next.js app
        working-directory: prototype/app
        run: npm run build
