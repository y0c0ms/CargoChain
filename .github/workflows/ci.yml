name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (Solidity + TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            prototype/package-lock.json
            prototype/app/package-lock.json

      - name: Install Hardhat workspace
        working-directory: prototype
        run: npm ci

      - name: Install front-end workspace
        working-directory: prototype/app
        run: npm ci

      - name: Solidity lint (solhint)
        working-directory: prototype
        run: npm run lint:sol

      - name: TypeScript type-check (front-end)
        working-directory: prototype/app
        run: npx tsc --noEmit

  test:
    name: Hardhat tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: prototype/package-lock.json

      - name: Install Hardhat workspace
        working-directory: prototype
        run: npm ci

      - name: Run test suite
        working-directory: prototype
        run: npx hardhat test

  codeql:
    name: CodeQL (JavaScript/TypeScript)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Perform analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
